name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Validator smoke tests
        run: npm test
      - name: Validate data files
        run: npm run validate
      - name: Build site
        run: npm run build
